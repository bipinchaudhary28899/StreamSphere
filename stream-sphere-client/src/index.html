<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>StreamSphere — Watch & Share Videos</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="StreamSphere — discover, watch, and share videos across every category. Stream the best content from creators worldwide.">

  <!-- Preconnect to font origins so the browser opens connections early -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://lh3.googleusercontent.com" crossorigin>

  <!-- Fonts — display=swap already set, load non-blocking -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
  <!-- Material Icons with font-display:block to avoid invisible text flash -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons&display=block" rel="stylesheet">
</head>
<body class="mat-typography">
  <app-root></app-root>
</body>
</html>
