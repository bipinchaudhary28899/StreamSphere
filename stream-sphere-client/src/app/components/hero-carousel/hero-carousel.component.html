<div class="hero-carousel" *ngIf="videos.length > 0 && !isLoading && !error">
  <div class="hero-container">

    <!-- Background Video/Image -->
    <div class="hero-background">
      <!-- 8-second preview MP4 — lightweight, no HLS needed for carousel -->
      <video
        #videoElement
        *ngIf="currentPreviewSrc"
        [src]="currentPreviewSrc"
        class="hero-video"
        loop
        playsinline
        preload="metadata"
        (loadeddata)="onVideoLoad()">
      </video>

      <img
        *ngIf="!currentVideo?.S3_url && currentVideo?.thumbnailUrl"
        [src]="currentVideo?.thumbnailUrl"
        [alt]="currentVideo?.title"
        class="hero-image">
    </div>

    <!-- Gradient Overlays -->
    <div class="hero-overlay">
      <div class="gradient-top"></div>
      <div class="gradient-bottom"></div>
    </div>

    <!-- Content -->
    <div class="hero-content">
      <div class="hero-text">

        <!-- Title — hidden when description is fully expanded to save space -->
        <h1 class="hero-title" *ngIf="!descriptionExpanded">{{ currentVideo?.title }}</h1>

        <!-- Description — clamped to 3 lines by default -->
        <p class="hero-description" [class.expanded]="descriptionExpanded">
          {{ currentVideo?.description }}
        </p>

        <!-- Read more / Read less toggle (only shown when text is long) -->
        <button
          *ngIf="(currentVideo?.description?.length ?? 0) > DESC_THRESHOLD"
          class="desc-toggle-btn"
          (click)="toggleDescription($event)">
          {{ descriptionExpanded ? 'Read less ▲' : 'Read more ▼' }}
        </button>

        <div class="hero-meta">
          <span class="hero-likes">{{ currentVideo?.likes }} likes</span>
          <span class="hero-timestamp">
            {{ formatTimestamp(createDate(currentVideo?.uploadedAt || '')) }}
          </span>
        </div>
        <div class="hero-actions">
          <button class="hero-play-btn" (click)="onPlayNowClick()">
            <span class="play-icon">▶</span>
            Play Now
          </button>

          <!-- Shown before first interaction -->
          <button
            class="hero-sound-btn"
            *ngIf="!userInteracted"
            (click)="handleWatchWithSound()">
            🔇 Watch with Sound
          </button>

          <!-- Shown after interaction — always visible so it never disappears mid-play -->
          <button
            class="hero-mute-btn"
            *ngIf="userInteracted"
            (click)="toggleMute()">
            {{ isMuted ? '🔇 Unmute' : '🔊 Mute' }}
          </button>
        </div>
      </div>
    </div>

    <!-- Navigation Controls -->
    <div class="hero-controls">
      <button class="nav-btn prev-btn" (click)="previousVideo()">‹</button>
      <button class="nav-btn next-btn" (click)="nextVideo()">›</button>
    </div>

  </div>
</div>

<!-- Loading State -->
<div class="hero-carousel loading" *ngIf="isLoading">
  <div class="loading-spinner">
    <div class="spinner"></div>
    <p>Loading top videos...</p>
  </div>
</div>

<!-- Error State -->
<div class="hero-carousel error" *ngIf="error && !isLoading">
  <div class="error-message">
    <p>{{ error }}</p>
    <button (click)="loadTopVideos()">Try Again</button>
  </div>
</div>

<!-- Empty State -->
<div class="hero-carousel empty" *ngIf="!isLoading && !error && videos.length === 0">
  <div class="empty-message">
    <p>No videos available</p>
    <button (click)="loadTopVideos()">Refresh</button>
  </div>
</div>
