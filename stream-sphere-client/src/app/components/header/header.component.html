<!-- ── Main header bar ──────────────────────────────────────────────────── -->
<header class="app-header" [class.scrolled]="isScrolled" [class.search-active]="searchOpen">

  <div class="header-inner">

    <!-- Logo -->
    <div class="logo" (click)="navigateToHome()">
      <picture>
        <source srcset="assets/thumbs/Stream Sphere Icon.webp" type="image/webp" />
        <img src="assets/thumbs/Stream Sphere Icon.png"
             alt="StreamSphere"
             width="64" height="64"
             class="app-logo desktop-logo" />
      </picture>
      <picture>
        <source srcset="assets/thumbs/ss_icon_mobile.webp" type="image/webp" />
        <img src="assets/thumbs/ss_icon_mobile.png"
             alt="StreamSphere"
             width="44" height="44"
             class="app-logo mobile-logo" />
      </picture>
    </div>

    <!-- Spacer -->
    <div class="header-spacer"></div>

    <!-- Right actions -->
    <div class="header-actions">

      <!-- Search toggle -->
      <button class="action-btn" (click)="toggleSearch()"
              [attr.aria-label]="searchOpen ? 'Close search' : 'Open search'">
        <mat-icon>{{ searchOpen ? 'close' : 'search' }}</mat-icon>
      </button>

      <!-- Dark mode toggle -->
      <button class="action-btn theme-btn"
              (click)="themeService.toggle()"
              [matTooltip]="themeService.isDark() ? 'Switch to light mode' : 'Switch to dark mode'">
        <mat-icon>{{ themeService.isDark() ? 'light_mode' : 'dark_mode' }}</mat-icon>
      </button>

      <!-- Avatar / user menu (logged in) -->
      <button *ngIf="isLoggedIn"
              class="avatar-btn"
              [matMenuTriggerFor]="userMenu">
        <img [src]="profileImage"
             [alt]="user?.name"
             (error)="onImageError($event)"
             class="avatar-img" />
      </button>

      <!-- Login button (not logged in) -->
      <app-user-login *ngIf="!isLoggedIn"></app-user-login>

    </div><!-- /header-actions -->
  </div><!-- /header-inner -->

  <!-- ── Search overlay panel ─────────────────────────────────────────── -->
  <div class="search-panel" [class.open]="searchOpen" (click)="$event.stopPropagation()">

    <div class="search-input-row">
      <mat-icon class="search-lead-icon">search</mat-icon>
      <input #searchInput
             class="search-input"
             type="text"
             placeholder="Search videos, channels…"
             [value]="searchTerm"
             (input)="onSearchInput($event)" />
      <button *ngIf="searchTerm" class="search-clear-btn" (click)="clearSearch()">
        <mat-icon>close</mat-icon>
      </button>
    </div>

    <!-- Category chips -->
    <div class="search-categories">
      <button class="cat-chip" [class.active]="selectedCategory === 'All'"
              (click)="selectCategory('All')">All</button>
      <button *ngFor="let cat of categories"
              class="cat-chip"
              [class.active]="selectedCategory === cat"
              (click)="selectCategory(cat)">{{ cat }}</button>
    </div>

  </div><!-- /search-panel -->

</header>

<!-- Backdrop — closes search when clicking outside -->
<div class="search-backdrop"
     [class.visible]="searchOpen"
     (click)="closeSearch()">
</div>

<!-- ── User dropdown menu ───────────────────────────────────────────────── -->
<mat-menu #userMenu="matMenu" class="ss-user-menu">

  <!-- Profile card -->
  <div class="menu-profile-card" (click)="$event.stopPropagation()">
    <img [src]="profileImage" (error)="onImageError($event)" class="menu-avatar" />
    <div class="menu-user-info">
      <div class="menu-name">{{ user?.name }}</div>
      <div class="menu-email">{{ user?.email }}</div>
    </div>
  </div>

  <mat-divider></mat-divider>

  <button mat-menu-item (click)="navigateToHome()">
    <mat-icon>home</mat-icon><span>Home</span>
  </button>
  <button mat-menu-item (click)="navigateToUpload()">
    <mat-icon>cloud_upload</mat-icon><span>Upload Video</span>
  </button>
  <button mat-menu-item (click)="navigateToProfile()">
    <mat-icon>person</mat-icon><span>My Profile</span>
  </button>
  <button mat-menu-item (click)="navigateToHistory()">
    <mat-icon>history</mat-icon><span>Watch History</span>
  </button>

  <mat-divider></mat-divider>

  <button mat-menu-item class="sign-out-item" (click)="logout()">
    <mat-icon>logout</mat-icon><span>Sign Out</span>
  </button>

</mat-menu>
